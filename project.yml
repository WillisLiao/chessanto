name: Chessanto
options:
  bundleIdPrefix: com.chessanto
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ChessCore:
    path: Packages/ChessCore
  EngineKit:
    path: Packages/EngineKit
  AnalysisKit:
    path: Packages/AnalysisKit
  CoachKit:
    path: Packages/CoachKit
  ChessComKit:
    path: Packages/ChessComKit
  Persistence:
    path: Packages/Persistence
  CompanionKit:
    path: Packages/CompanionKit

targets:
  Chessanto:
    type: application
    platform: macOS
    sources:
      - path: App/Sources/Chessanto
      # `resources:` is not an XcodeGen key (it silently ignores unknown
      # keys) - bundle resources are a sources entry with a resources
      # buildPhase. Info.plist and entitlements are processed via the
      # info.path/entitlements.path settings below, so keep them out of
      # the copied bundle resources.
      - path: App/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chessanto.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: Chessanto
        LSApplicationCategoryType: public.app-category.education
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: App/Resources/Chessanto.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
    dependencies:
      - package: ChessCore
      - package: EngineKit
      - package: AnalysisKit
      - package: CoachKit
      - package: ChessComKit
      - package: Persistence
      - package: CompanionKit
        product: CompanionDomain
      - package: CompanionKit
        product: CompanionSecurity
      - package: CompanionKit
        product: CompanionCloudKit
    scheme:
      testTargets:
        - ChessantoTests
      gatherCoverageData: true

  ChessantoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: App/Tests/ChessantoTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.10"
    dependencies:
      - target: Chessanto

  ChessantoMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Mobile/Sources/ChessantoMobile
      - path: App/Resources/Pieces.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chessanto.companion
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    info:
      path: Mobile/Resources/Info.plist
      properties:
        CFBundleDisplayName: Chessanto
        NSCameraUsageDescription: Scan a Chessanto pairing code shown on your Mac.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: ChessCore
      - package: CompanionKit
        product: CompanionDomain
      - package: CompanionKit
        product: CompanionSecurity
      - package: CompanionKit
        product: CompanionCloudKit
    scheme:
      testTargets:
        - ChessantoMobileTests
      gatherCoverageData: true

  ChessantoMobileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Mobile/Tests/ChessantoMobileTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.10"
    dependencies:
      - target: ChessantoMobile

schemes:
  Chessanto:
    build:
      targets:
        Chessanto: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChessantoTests

  ChessantoMobile:
    build:
      targets:
        ChessantoMobile: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChessantoMobileTests
